name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            scons_args: platform=macos
          - name: linux
            os: ubuntu-latest
            scons_args: platform=linux arch=x86_64
          - name: windows
            os: windows-latest
            scons_args: platform=windows arch=x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Build (debug + release)
        run: |
          scons ${{ matrix.scons_args }} target=template_debug
          scons ${{ matrix.scons_args }} target=template_release

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: bin/*
          if-no-files-found: error

  package:
    name: package addon
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        # submodules not needed: package.sh only copies repo-root addon files + bin/

      - name: Collect binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: bin
          merge-multiple: true

      - name: Package
        run: ./package.sh

      - name: Zip
        run: |
          cd build
          zip -r ../tree-sitter-gd-addon.zip .

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: tree-sitter-gd-addon.zip
