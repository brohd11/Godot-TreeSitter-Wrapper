name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            scons_args: platform=macos
          - name: linux
            os: ubuntu-latest
            scons_args: platform=linux arch=x86_64
          - name: windows
            os: windows-latest
            scons_args: platform=windows arch=x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # full history so git describe sees tag refs on every build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Build (debug + release)
        run: |
          scons ${{ matrix.scons_args }} target=template_debug
          scons ${{ matrix.scons_args }} target=template_release

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: bin/*
          if-no-files-found: error

  package:
    name: package addon
    runs-on: ubuntu-latest
    needs: build
    # Runs on a v* tag, or on a manual run (handy for producing a test zip).
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        # submodules not needed: package.sh only copies the tree_sitter_gd/ folder
        # plus repo-root LICENSE/README + bin/

      - name: Collect binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: bin
          merge-multiple: true

      - name: Package
        run: ./package.sh

      # Uploads the packaged addon as a downloadable artifact. No release is
      # created — grab the zip from this run's Summary page and attach it to a
      # release you author by hand. Download yields <name>.zip containing
      # tree-sitter-gd-<version>/tree_sitter_gd/...
      - name: Upload addon zip
        uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-gd-${{ github.ref_name }}
          path: build/
          if-no-files-found: error
